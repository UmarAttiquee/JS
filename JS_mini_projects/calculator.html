  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {}

    .calContainer {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #ffffff;
    }

    .innerContainerC {
      background-color: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      width: 90%;
      max-width: 400px;
    }

    .innerContainerC:hover {
      box-shadow: 0 0 25px rgba(0, 123, 255, 0.4);
      /* blue glow */
      transform: scale(1.01);
      /* slight zoom for effect */
    }

    .inputDiv {
      margin-bottom: 20px;
    }

    #inputSearch {
      width: 100%;
      padding: 20px;
      font-size: 1.5rem;
      text-align: right;
      border: 2px solid #ccc;
      border-radius: 8px;
      background-color: #f9f9f9;
    }

    .btnC {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
    }

    .btn {
      padding: 20px;
      font-size: 1.3rem;
      background-color: #e0e0e0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease-in-out;
      margin: 15px;
    }

    .btn:hover {
      background-color: #d0d0d0;
    }

    #btn {
      background-color: #4caf50;
      color: white;
    }

    #btn:hover {
      background-color: #45a049;
    }

    #btnc {
      background-color: #f44336;
      color: white;
    }

    #btnc:hover {
      background-color: #e53935;
    }
.btnx {
      color: white;
      text-decoration: none;
      padding: 14px 20px;
      margin: 0 10px;
      background-color: #444;
      border-radius: 5px;
      transition: background-color 0.3s;
      font-family: Arial, sans-serif;
    }

    .btnx:hover {
      background-color: #555;
    }
  </style>
</head>
<body>

  <nav style="margin-top: 50px; margin-bottom: 40px;">
    <a class="btnx" href="/calculator.html">Calculator</a>
    <a class="btnx" href="/digitalwatch.html">Watch</a>
    <a class="btnx" href="/gam.html">Game 1</a>
    <a class="btnx" href="/bat.html">Game 2</a>
  </nav>
  <div class="calContainer">
    <div class="innerContainerC">
      <h1 style="text-align: center; padding: 40px;">Calculator</h1>

      <div class="inputDiv">
        <input type="text" id="inputSearch" readonly>
      </div>
      <div class="btnc">
        <button class="btn" id="btn0">0</button>
        <button class="btn" id="btn1">1</button>
        <button class="btn" id="btn2">2</button>
        <button class="btn" id="btn3">3</button>
        <button class="btn" id="btn4">4</button>
        <button class="btn" id="btn5">5</button>
        <button class="btn" id="btn6">6</button>
        <button class="btn" id="btn7">7</button>
        <button class="btn" id="btn8">8</button>
        <button class="btn" id="btn9">9</button>
        <button class="btn" id="btn+">+</button>
        <button class="btn" id="btn-">-</button>
        <button class="btn" id="btn*">*</button>
        <button class="btn" id="btn/">/</button>
        <button class="btn" id="btn=">=</button>
        <button class="btn" id="btnc">c</button>


      </div>

    </div>
  </div>

  <script src="index.js"> 

    
let result = document.querySelector('#inputSearch')
    let value = localStorage.getItem('calculation')
    let buttons = document.querySelectorAll('.btn')
    result.value = value

    buttons.forEach((e)=>{
         e.addEventListener('click' , (f)=>{
          const id  = f.target.id
          console.log(id)
          if(id === 'btnc')
         {
          value = 0
          result.value = value
                    localStorage.removeItem('calculation')

         }
         else if(id === 'btn=')
         {
          value = eval(value)
          result.value = value
          localStorage.setItem('calculation' , value)
         }
         else
         {
          value  +=  f.target.textContent
          result.value = value
          localStorage.setItem('calculation' , value)
         }
         })
    })
